kind = "web"
previewPath = "/"
title = "BebeMart"
version = "1.0.0"
id = "artifacts/bebemart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23768

[services.development]
run = "pnpm --filter @workspace/bebemart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bebemart", "run", "build" ]
publicDir = "artifacts/bebemart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23768"
BASE_PATH = "/"
