[build]
  base = "artifacts/bebemart"
  command = "cd ../.. && corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/bebemart run build:netlify"
  publish = "dist"
  
[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
